version: '3.8'

services:
  inkos:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - HTTP_PROXY=
        - HTTPS_PROXY=
        - NO_PROXY=
        - http_proxy=
        - https_proxy=
        - no_proxy=
    container_name: inkos
    ports:
      - "13001:13001"
    volumes:
      - ./books:/app/books
      - ./logs:/app/logs
      # 使用命名卷缓存依赖，避免重复安装
      - node_modules_cache:/app/node_modules
      - node_modules_core:/app/packages/core/node_modules
      - node_modules_studio:/app/packages/studio/node_modules
      - node_modules_cli:/app/packages/cli/node_modules
    environment:
      - INKOS_PROJECT_ROOT=/app/books
      - INKOS_STUDIO_PORT=13001
      - INKOS_LLM_API_KEY=${INKOS_LLM_API_KEY}
      - INKOS_LLM_BASE_URL=${INKOS_LLM_BASE_URL:-https://api.openai.com/v1}
      - INKOS_LLM_MODEL=${INKOS_LLM_MODEL:-gpt-3.5-turbo}
      - INKOS_LLM_MAX_TOKENS=${INKOS_LLM_MAX_TOKENS:-4096}
      - INKOS_LLM_TEMPERATURE=${INKOS_LLM_TEMPERATURE:-0.7}
    restart: unless-stopped

# 定义命名卷，持久化存储依赖
volumes:
  node_modules_cache:
  node_modules_core:
  node_modules_studio:
  node_modules_cli:
